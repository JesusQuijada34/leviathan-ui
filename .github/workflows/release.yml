name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.5)'
        required: true
        default: 'v1.0.5'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 Pillow pyinstaller build twine
        
    - name: Build package
      run: |
        python -m build --wheel
        
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name leviathan-ui leviathan-ui.py
        
    - name: Create IFLAPP Package
      run: |
        echo "Creating IFLAPP package..."
        # Copy necessary files
        mkdir -p iflapp_build
        cp -r leviathan_ui iflapp_build/
        cp -r installer_classes iflapp_build/
        cp leviathan-ui.py iflapp_build/
        cp pyproject.toml iflapp_build/
        cp README.md iflapp_build/
        cp LICENSE iflapp_build/
        
        # Create package
        cd iflapp_build
        7z a -tzip ../leviathan-ui-${{ github.event.inputs.version || github.ref_name }}.iflapp.zip *
        cd ..
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iflapp-package
        path: '*.iflapp.zip'
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
          *.iflapp.zip
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
